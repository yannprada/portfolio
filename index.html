<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" type="text/css" href="style.css">
    <title>yannprada</title>
</head>
<body>
    <h1 class="title">
		<span>Yann Prada - developer</span>
		<a class="right" id="contact">
			<span id="address">contact</span>

		</li>
		<li class="card">

		</li>

    <script>		
		const email = atob("cHJhZGF5cm9sLnlhbm5pY2tAZ21haWwuY29t");
		document.getElementById("address").textContent = email;
		document.getElementById("contact").onclick = function() {
			navigator.clipboard.writeText(email);

		};
