<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" type="text/css" href="style.css">
    <title>yannprada</title>
</head>
<body>
    <h1 class="title">
		<span>Yann Prada - developer</span>
		<button class="right" onclick="togglePopup()"><span class="icon">✉</span> contact</button>
	</h1>
	<ul class="card-container">
		<li class="card">
			<a href="https://github.com/yannprada/n-cube">
				<span class="card-title">n-cube</span>
				<p class="card-description">A mobile game like Rubik's cube, built with Godot</p>
			</a>
		</li>
		<li class="card">
			<a href="https://github.com/yannprada/yaml_tkinter">
				<span class="card-title">YAML Tkinter</span>
				<p class="card-description">A utility for building Tkinter widget trees from YAML files</p>
			</a>
		</li>
		<li class="card">
			<a href="https://github.com/yannprada/cookie-garden-helper">
				<span class="card-title">Cookie Garden Helper</span>
				<p class="card-description">Automate your garden in the game Cookie Clicker</p>
			</a>
		</li>
	</ul>
	
	<div id="popupOverlay" class="overlay-container">
        <div class="popup-box">	
			<form id="contact-form" method="POST" action="https://formspree.io/f/{your-id}">
				<label>
					Name
					<input type="text" name="name" required>
				</label>

				<label>
					Email
					<input type="email" name="_replyto" required>
				</label>

				<label>
					Message
					<textarea name="message" rows="6" required></textarea>
				</label>

				<!-- optional: add a redirect after successful submit -->
				<input type="hidden" name="_next" value="/thanks.html">

				<button type="submit">Send</button>

				<div id="form-status" aria-live="polite" style="margin-top:.5rem"></div>
			</form>
		</div>
	</div>

    <script>
        function togglePopup() {
            const overlay = document.getElementById('popupOverlay');
            overlay.classList.toggle('show');
        }
    </script>
</body>
</html>
